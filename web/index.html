<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注塑成型工艺参数智能推荐系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/styles/ag-theme-alpine.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <h1>注塑成型工艺参数智能推荐系统</h1>
            <div class="connection-status" id="connectionStatus">
                <span class="status-dot"></span>
                <span class="status-text">连接中...</span>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧面板：配置 -->
            <aside class="sidebar">
                <div class="panel">
                    <h3>件号选择</h3>
                    <select id="partSelect" class="form-control">
                        <option value="">选择件号...</option>
                    </select>
                    <div class="panel-actions" style="margin-top: 0.75rem;">
                        <button id="refreshPartsBtn" class="btn btn-small btn-secondary">刷新列表</button>
                        <button id="newPartBtn" class="btn btn-small btn-primary">➕ 新建件号</button>
                    </div>
                </div>

                <div class="panel" id="configPanel" style="display: none;">
                    <h3>算法设置</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>初始数据数量:</label>
                            <input type="number" id="nInit" class="form-control" value="20" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label>来源:</label>
                            <select id="initSource" class="form-control">
                                <option value="auto">自动生成</option>
                                <option value="file">文件导入</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" id="initFileGroup" style="display: none;">
                        <label>选择文件:</label>
                        <input type="file" id="initExcelFile" class="form-control" accept=".xlsx,.xls,.csv">
                        <small class="form-hint">支持 Excel (.xlsx, .xls) 或 CSV 格式</small>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>批次数:</label>
                            <input type="number" id="nIter" class="form-control" value="10" min="1" max="100">
                        </div>
                        <div class="form-group">
                            <label>批次大小:</label>
                            <input type="number" id="batchSize" class="form-control" value="4" min="1" max="20">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>运行模式:</label>
                        <select id="modeSelect" class="form-control">
                            <option value="manual">正式（手动输入）</option>
                            <option value="auto">模拟（自动计算）</option>
                        </select>
                    </div>
                </div>

                <!-- 左侧水平分隔线：算法设置和参数配置之间 -->
                <div class="resizer-horizontal" id="resizerConfigParam" style="display: none;"></div>

                <div class="panel" id="paramPanel" style="display: none;">
                    <div class="panel-header">
                        <h3>参数配置</h3>
                        <label class="edit-toggle">
                            <input type="checkbox" id="editConfigToggle">
                            <span>✏️ 启用编辑</span>
                        </label>
                    </div>
                    <div id="paramList"></div>
                    <div class="panel-actions" id="paramPanelActions" style="display: none;">
                        <button id="saveConfigBtn" class="btn btn-small btn-primary">💾 保存配置</button>
                        <button id="addParamBtn" class="btn btn-small">➕ 添加参数</button>
                        <button id="linkParamsBtn" class="btn btn-small">🔗 绑定参数</button>
                    </div>
                    <div id="linkParamsPanel" class="link-params-panel" style="display: none;">
                        <div class="link-params-header">
                            <span>选择要绑定的参数（至少2个）</span>
                            <button id="cancelLinkBtn" class="btn btn-small">取消</button>
                        </div>
                        <div id="linkParamsList" class="link-params-list"></div>
                        <div class="link-params-actions">
                            <button id="confirmSyncLinkBtn" class="btn btn-small btn-primary">同步数值绑定</button>
                            <button id="confirmModeLinkBtn" class="btn btn-small btn-primary">模式选择绑定</button>
                        </div>
                    </div>
                </div>

                <!-- 参数编辑模态框 -->
                <div id="paramEditModal" class="modal" style="display: none;">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h4>编辑参数</h4>
                            <button class="modal-close" onclick="app.closeParamModal()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label>参数名称</label>
                                <input type="text" id="editParamName" class="form-control" placeholder="输入参数名称">
                            </div>
                            <div class="form-group">
                                <label>参数类型</label>
                                <select id="editParamType" class="form-control">
                                    <option value="fixed">固定值</option>
                                    <option value="range">范围</option>
                                    <option value="set">离散集合</option>
                                </select>
                            </div>
                            <div id="editParamFields">
                                <!-- 动态生成的字段 -->
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-secondary" onclick="app.closeParamModal()">取消</button>
                            <button class="btn btn-primary" onclick="app.saveParamEdit()">保存</button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 垂直分隔线：侧边栏和主区域之间 -->
            <div class="resizer-vertical" id="resizerVertical"></div>

            <!-- 右侧主区域 -->
            <main class="main-panel">
                <!-- 控制栏 -->
                <div class="control-bar">
                    <button id="startBtn" class="btn btn-primary" disabled>
                        ▶ 开始寻优
                    </button>
                    <button id="saveExitBtn" class="btn btn-warning" disabled>
                        💾 保存退出
                    </button>
                    <button id="resetBtn" class="btn btn-secondary">
                        🗑️ 清除历史
                    </button>
                    <span id="sessionInfo" class="session-info"></span>
                </div>

                <!-- 交互输入区 -->
                <div class="input-section" id="inputSection">
                    <div class="input-card">
                        <h4>请在机台上试模并输入结果</h4>
                        <div id="currentParams" class="params-display">
                            <div id="waitingPrompt" class="waiting-prompt">
                                请配置参数并点击"开始寻优"
                            </div>
                            <table id="batchParamsTable" class="batch-params-table" style="display: none;">
                                <!-- 动态生成 -->
                            </table>
                        </div>
                        <div class="input-progress" id="inputProgress" style="display: none;">
                            正在输入：第 <span id="currentGroupNum">1</span> / <span id="totalGroups">4</span> 组
                        </div>
                        <div class="input-form" id="inputForm" style="display: none;">
                            <div class="form-group">
                                <label id="formErrorLabel">面型评价指标:</label>
                                <input type="number" id="formErrorInput" class="form-control" step="0.01" placeholder="输入数值">
                            </div>
                            <div class="form-group checkbox-group">
                                <label>
                                    <input type="checkbox" id="isShrinkInput">
                                    是否缩水
                                </label>
                            </div>
                            <button id="submitBtn" class="btn btn-primary">提交</button>
                        </div>
                    </div>
                </div>

                <!-- 右侧水平分隔线1：输入区和日志区之间 -->
                <div class="resizer-horizontal" id="resizerInputLog"></div>

                <!-- 洞察面板（标签页） -->
                <div class="insights-panel">
                    <div class="insights-header">
                        <div class="insights-tabs">
                            <button class="insights-tab active" data-tab="log">运行日志</button>
                            <button class="insights-tab" data-tab="prediction">预测质量</button>
                            <button class="insights-tab" data-tab="acquisition">采集函数</button>
                            <button class="insights-tab" data-tab="sensitivity">参数敏感</button>
                            <button class="insights-tab" data-tab="trajectory">优化轨迹</button>
                        </div>
                    </div>
                    <div class="insights-content">
                        <!-- 运行日志 -->
                        <div class="insights-pane active" id="logPane">
                            <div id="logContainer" class="log-container"></div>
                            <button id="clearLogBtn" class="btn btn-small">清除日志</button>
                        </div>
                        <!-- 预测质量 -->
                        <div class="insights-pane" id="predictionPane">
                            <div class="prediction-content">
                                <div class="prediction-header">
                                    <p class="prediction-desc">GP模型预测的form_error分布，蓝色区域表示预测质量较好</p>
                                    <button id="refreshHeatmapBtn" class="btn btn-small">刷新</button>
                                </div>
                                <div class="prediction-controls">
                                    <label>X轴参数:</label>
                                    <select id="heatmapXParam"></select>
                                    <label>Y轴参数:</label>
                                    <select id="heatmapYParam"></select>
                                </div>
                                <div id="predictionHeatmap" class="heatmap-container"></div>
                            </div>
                        </div>
                        <!-- 采集函数 -->
                        <div class="insights-pane" id="acquisitionPane">
                            <div class="placeholder-content">
                                <p>采集函数分析（Phase 3 实现）</p>
                            </div>
                        </div>
                        <!-- 参数敏感 -->
                        <div class="insights-pane" id="sensitivityPane">
                            <div class="sensitivity-content">
                                <div class="sensitivity-header">
                                    <p class="sensitivity-desc">基于 GP 核函数长度尺度分析，长度尺度越小表示该参数越敏感</p>
                                    <button id="refreshSensitivityBtn" class="btn btn-small">刷新分析</button>
                                </div>
                                <div id="sensitivityChart" class="sensitivity-chart"></div>
                                <div id="sensitivityTable" class="sensitivity-table"></div>
                            </div>
                        </div>
                        <!-- 优化轨迹 -->
                        <div class="insights-pane" id="trajectoryPane">
                            <div class="placeholder-content">
                                <p>优化轨迹可视化（Phase 4 实现）</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 右侧水平分隔线2：日志区和实验记录之间 -->
                <div class="resizer-horizontal" id="resizerLogRecords"></div>

                <!-- 历史记录表格 -->
                <div class="records-section">
                    <div id="recordsGrid" class="ag-theme-alpine" style="height: 100%;"></div>
                    <div class="records-hint">
                        提示：双击单元格可编辑；选择行后点击"删除行"可回退到该点；保存后会自动截断更晚批次并重启优化。
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.0.0/dist/ag-grid-community.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
